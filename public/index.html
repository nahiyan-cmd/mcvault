<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MC Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand__mark">MV</div>
    <div class="brand__text">
      <span class="brand__name">MC Vault</span>
      <span class="brand__sub">Account Manager</span>
    </div>
  </div>
  <div class="topbar__right">
    <div class="capacity">
      <div class="capacity__label">
        <span id="capacityCount">0/10 accounts</span>
        <span id="capacityPercent">0% full</span>
      </div>
      <div class="capacity__track">
        <div class="capacity__fill" id="capacityFill"></div>
      </div>
    </div>
    <!-- Admin badge: shown only when logged in as admin -->
    <div class="admin-badge" id="adminBadge" style="display:none">
      <span class="admin-badge__dot"></span>
      <span id="adminBadgeName">admin</span>
      <button class="admin-badge__logout" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<main class="content">
  <div class="intro" id="introBlock">
    <h1>Vault is empty</h1>
    <p>No accounts have been added yet.</p>
  </div>
  <div class="grid" id="accountGrid"></div>
</main>

<footer class="footer">
  <span>Created by The Lord NotzKing — exclusively for his special friends</span>
  <span class="footer__sep">·</span>
  <a href="/admin-login.html" class="footer__admin-link" id="adminFooterLink"><strong>Admin?</strong></a>
</footer>

<!-- Add/Edit Account Modal (admin only) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Account</h2>
    <p class="modal__subtitle">Enter a Minecraft username — skin, UUID, and tier data will be fetched automatically.</p>
    <input type="text" id="usernameInput" class="modal__input" placeholder="e.g. Notch" autocomplete="off" />
    <div class="modal__error" id="modalError"></div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--secondary" id="modalCancel">Cancel</button>
      <button class="modal__btn modal__btn--primary" id="modalSubmit">Fetch & Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
